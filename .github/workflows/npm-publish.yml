name: npm publish (signed + provenance)

# Triggered by pushing a `v*` tag (e.g. `git tag -s v1.0.2 -m '...' && git push --tags`).
# Publishes the package to npm with provenance attestation via OIDC + Sigstore.
# The published tarball carries:
#   - npm provenance (https://docs.npmjs.com/generating-provenance-statements)
#     verifiable with `npm audit signatures` and via Sigstore's transparency log
#   - SBOM in CycloneDX format attached as a release artifact (separate workflow)
#
# Required repo configuration:
#   - npm token in NPM_TOKEN secret (with publish access to the package scope)
#   - id-token: write permission for OIDC-based provenance
#   - "trusted publisher" relationship registered on npmjs.com between this repo
#     and the package name `artagon-agent-cli-plugin`

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.2). Leave blank to use the current ref."
        required: false

permissions:
  contents: read
  # OIDC token for npm provenance attestation.
  id-token: write
  # For attaching SBOM/signature artifacts to a GitHub release.
  attestations: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Run gates (typecheck, lint, tests)
        run: |
          pnpm typecheck
          pnpm exec biome check .
          pnpm test

      - name: Verify tarball contents
        run: |
          # `npm pack --dry-run --json` lists what would ship without actually
          # creating the tarball. Catches accidental inclusion of secrets,
          # tests, or stryker artifacts BEFORE publish.
          pnpm pack --dry-run

      - name: Publish to npm with provenance
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate CycloneDX SBOM
        # @cyclonedx/cyclonedx-npm is a pinned devDependency. The
        # integrity SHA-512 lives in pnpm-lock.yaml and is enforced by
        # `pnpm install --frozen-lockfile` above — this is the actual
        # content-hash pin, stronger than version-tag pinning. Running
        # via `pnpm exec` (NOT `npx`) ensures the locally-installed,
        # integrity-verified copy is used; `npx` would resolve a fresh
        # copy from the registry at job time, bypassing the lockfile.
        run: |
          pnpm exec cyclonedx-npm \
            --output-format JSON \
            --output-file artagon-agent-cli-plugin.cdx.json
          pnpm exec cyclonedx-npm \
            --output-format XML \
            --output-file artagon-agent-cli-plugin.cdx.xml

      - name: Attest SBOM
        uses: actions/attest-sbom@f19ab44411e02574a74181cec8eb584319d0f779 # v1.4.0
        with:
          subject-path: "*.tgz"
          sbom-path: "artagon-agent-cli-plugin.cdx.json"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: "*.tgz"

      - name: Upload SBOM as release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            artagon-agent-cli-plugin.cdx.json
            artagon-agent-cli-plugin.cdx.xml
            *.tgz
          generate_release_notes: true
