name: PR Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  # Workflow-level default is read-only; the delete-branch job below
  # scopes contents:write only where it's needed (per security audit).
  contents: read

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete merged branch
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const defaultBranch = context.payload.repository.default_branch;
            if (branch === defaultBranch) {
              core.info(`Refusing to delete default branch: ${branch}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              core.info(`Deleted branch: ${branch}`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Branch already deleted: ${branch}`);
                return;
              }
              throw error;
            }
