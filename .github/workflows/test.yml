name: test

on:
  # `push` only on main — feature branches go through `pull_request`.
  # Both used to trigger together for same-repo PRs, doubling CI cost
  # for every commit.
  push:
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-flight runs of the same workflow + ref when a new commit
# lands. Without this, rapid pushes pile up runs and burn CI time on
# stale commits.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege: this workflow only needs to clone the
# repository to run tests. No artifacts published, no PR comments, no
# release assets. Default GITHUB_TOKEN permissions can be permissive
# under some org policies; pin them here. Matches the
# OpenSSF Scorecard "Token-Permissions" expectation and the rest of
# the workflows in this repo.
permissions:
  contents: read

# Security note: this workflow uses no user-controlled `${{ github.event.* }}`
# interpolation in `run:` blocks. Only matrix and runner-managed values are
# templated.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 18 EOL'd 2025-04-30 (https://nodejs.org/en/about/previous-releases).
        # Continuing to test it spends CI minutes on a runtime no realistic
        # downstream user runs anymore — and the install.yml matrix already
        # dropped it. Floor matches Node's currently-maintained line: 20 LTS
        # (active support through 2026-04) + 22 LTS (active through 2027-04).
        # engines.node = ">=22.9.0" (Step 1.5 / I2). 22.9 made
        # `node:sqlite` stable without --experimental-sqlite. 22.x =
        # latest LTS pinned to current; 24.x adds forward coverage.
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main

      - name: Set up pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Verify vendored plugin trees match canonical lib/
        # The three plugins/<host>/lib/ trees are vendored byte-equal
        # copies of repo-root lib/. Without this CI check, a PR that
        # touches lib/ without running `pnpm vendor:lib` would ship
        # plugin trees out of sync. The check exits non-zero with the
        # offending files listed if there's any drift.
        run: pnpm vendor:lib:check

      - name: Run tests
        run: pnpm test
