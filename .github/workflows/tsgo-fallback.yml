name: tsgo-fallback

# Weekly type-check using stable `tsc` to detect tsgo regressions.
# tsgo (`@typescript/native-preview`) is pre-1.0 and ships breaking changes
# regularly; this job validates that our typecheck still passes under
# stable TypeScript so we can fall back if tsgo regresses.

on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fallback:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Type-check under stable tsc
        run: pnpm run typecheck:fallback
